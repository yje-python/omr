<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var repo = '/omr';

      var l = window.location;
      var path = l.pathname.slice(repo.length);

      // query, hash까지 포함
      var redirect = repo + '/#' + path + l.search + l.hash;

      window.location.replace(redirect);
    </script>
  </head>
</html>
