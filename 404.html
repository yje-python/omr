<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      const repo = '/omr'

      const fullPath =
        window.location.pathname +
        window.location.search +
        window.location.hash

      const path = fullPath.replace(repo, '')

      window.location.replace(repo + '/#' + path)
    </script>
  </head>
</html>
